name: Tests

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:

  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
          cache-dependency-path: gateway/package-lock.json

      - name: Install dependencies
        run: cd gateway && npm ci

      - name: Run unit tests
        run: cd gateway && npm test -- --coverage
        env:
          NODE_ENV: test
          JWT_SECRET: ci_test_secret

      - name: Upload coverage
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: unit-coverage
          path: gateway/coverage/

  integration-tests:
    name: Integration Tests
    runs-on: ubuntu-latest

    services:
      redis:
        image: redis:7-alpine
        ports: ["6379:6379"]
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 5

      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_DB:       gateway_test
          POSTGRES_USER:     admin
          POSTGRES_PASSWORD: password
        ports: ["5432:5432"]
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
          cache-dependency-path: gateway/package-lock.json

      - name: Install dependencies
        run: cd gateway && npm ci

      - name: Run schema migrations
        run: |
          PGPASSWORD=password psql \
            -h localhost -U admin -d gateway_test \
            -f gateway/src/db/schema.sql
        env:
          PGPASSWORD: password

      - name: Run integration tests
        run: cd gateway && npm run test:integration
        env:
          NODE_ENV:      test
          JWT_SECRET:    ci_test_secret
          ADMIN_KEY:     ci_admin_key
          REDIS_URL:     redis://localhost:6379
          DATABASE_URL:  postgresql://admin:password@localhost:5432/gateway_test
          UPSTREAM_URL:  http://localhost:8080
          ABUSEIPDB_KEY: demo_mode

  docker-build:
    name: Docker Build Check
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Build gateway image
        run: docker build -t gateway-test ./gateway

      - name: Build dashboard image
        run: docker build -t dashboard-test ./dashboard

      - name: Smoke test — docker compose up
        run: |
          cp .env.example .env
          docker compose up -d redis postgres
          sleep 10
          docker compose up -d gateway
          sleep 5
          curl --fail http://localhost:3001/health
          docker compose down