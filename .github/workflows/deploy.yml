name: Deploy to AWS

on:
  push:
    branches: [main]
  workflow_dispatch:  # allow manual trigger from GitHub UI

jobs:

  test:
    uses: ./.github/workflows/test.yml  # run all tests first

  deploy:
    name: Deploy to EC2
    runs-on: ubuntu-latest
    needs: [test]  # only deploy if tests pass
    environment: production

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region:            ca-central-1  # Canada Central

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build & push gateway to ECR
        env:
          REGISTRY:   ${{ steps.login-ecr.outputs.registry }}
          REPO:       zero-trust-gateway
          SHA:        ${{ github.sha }}
        run: |
          docker build -t $REGISTRY/$REPO:$SHA -t $REGISTRY/$REPO:latest ./gateway
          docker push $REGISTRY/$REPO:$SHA
          docker push $REGISTRY/$REPO:latest

      - name: Build & push dashboard to ECR
        env:
          REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          REPO:     zero-trust-dashboard
          SHA:      ${{ github.sha }}
        run: |
          docker build -t $REGISTRY/$REPO:$SHA -t $REGISTRY/$REPO:latest ./dashboard
          docker push $REGISTRY/$REPO:$SHA
          docker push $REGISTRY/$REPO:latest

      - name: SSH deploy to EC2
        uses: appleboy/ssh-action@v1.0.0
        with:
          host:     ${{ secrets.EC2_HOST }}
          username: ec2-user
          key:      ${{ secrets.EC2_SSH_KEY }}
          script: |
            set -e
            cd ~/zero-trust-gateway

            echo "📥 Pulling latest code..."
            git pull origin main

            echo "🐳 Pulling new images..."
            docker compose pull gateway dashboard

            echo "🔄 Rolling restart (no downtime)..."
            docker compose up -d --no-deps --force-recreate gateway worker dashboard

            echo "🧹 Cleaning old images..."
            docker system prune -f

            echo "✅ Deploy complete — $(date)"