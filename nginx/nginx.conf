events {
  worker_connections 1024;
}

http {
  # Rate limit at nginx level — first line of defense before gateway
  limit_req_zone $binary_remote_addr zone=api_limit:10m rate=300r/m;

  # Upstream services
  upstream gateway   { server gateway:3001; }
  upstream dashboard { server dashboard:3000; }

  server {
    listen 80;
    server_name _;

    # Dashboard UI
    location / {
      proxy_pass         http://dashboard;
      proxy_set_header   Host              $host;
      proxy_set_header   X-Real-IP         $remote_addr;
      proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
    }

    # Gateway API traffic
    location /api/ {
      limit_req zone=api_limit burst=80 nodelay;

      proxy_pass         http://gateway;
      proxy_set_header   Host              $host;
      proxy_set_header   X-Real-IP         $remote_addr;
      proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;

      # Support WebSocket upgrades
      proxy_http_version 1.1;
      proxy_set_header   Upgrade    $http_upgrade;
      proxy_set_header   Connection "upgrade";

      proxy_read_timeout    60s;
      proxy_connect_timeout 10s;
    }

    # Admin routes
    location /admin/ {
      proxy_pass       http://gateway;
      proxy_set_header Host            $host;
      proxy_set_header X-Real-IP       $remote_addr;
    }

    # Socket.IO for live dashboard
    location /socket.io/ {
      proxy_pass         http://gateway;
      proxy_http_version 1.1;
      proxy_set_header   Upgrade    $http_upgrade;
      proxy_set_header   Connection "upgrade";
      proxy_set_header   Host       $host;
    }

    # Gateway health check passthrough
    location /health {
      proxy_pass http://gateway;
    }
  }
}