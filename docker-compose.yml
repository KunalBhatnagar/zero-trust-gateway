

services:

  # ── Infrastructure ──────────────────────────────────────────

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB:       gateway_db
      POSTGRES_USER:     admin
      POSTGRES_PASSWORD: 6636
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      # Runs schema.sql automatically on first boot
      - ./gateway/src/db/schema.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin -d gateway_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  # ── Application ──────────────────────────────────────────────

  gateway:
    build:
      context:    ./gateway
      dockerfile: Dockerfile
    ports:
      - "3001:3001"
    env_file: .env
    environment:
      PORT:          3001
      REDIS_URL:     redis://redis:6379
      DATABASE_URL:  postgresql://admin:6636@postgres:5432/gateway_db
      UPSTREAM_URL:  http://mock-api:8080
      DASHBOARD_URL: http://localhost:3000
    depends_on:
      redis:    { condition: service_healthy }
      postgres: { condition: service_healthy }
    restart: unless-stopped

  worker:
    build:
      context:    ./gateway
      dockerfile: Dockerfile
    command: node src/threat/worker.js
    env_file: .env
    environment:
      REDIS_URL:    redis://redis:6379
      DATABASE_URL: postgresql://admin:6636@postgres:5432/gateway_db
    depends_on:
      redis:    { condition: service_healthy }
      postgres: { condition: service_healthy }
    restart: unless-stopped

  dashboard:
    build:
      context:    ./dashboard
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_ADMIN_KEY:   ${ADMIN_KEY:-admin_key_change_in_prod}
        NEXT_PUBLIC_GATEWAY_URL: http://localhost:3001
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_GATEWAY_URL: http://localhost:3001
      NEXT_PUBLIC_ADMIN_KEY:   ${ADMIN_KEY:-admin_key_change_in_prod}
    depends_on:
      - gateway
    restart: unless-stopped

  # Fake upstream API — what the gateway protects
  mock-api:
    image: node:18-alpine
    working_dir: /app
    command: >
      sh -c "npm install -g json-server &&
             json-server --host 0.0.0.0 --port 8080 --watch /data/db.json"
    ports:
      - "8080:8080"
    volumes:
      - ./scripts/demo/mock-db.json:/data/db.json

  nginx:
    image: nginx:1.25-alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - gateway
      - dashboard
    restart: unless-stopped

volumes:
  redis_data:
  postgres_data: